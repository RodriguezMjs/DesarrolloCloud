version: '3.9'

services:
  db:
    image: postgres:15
    container_name: projectbackend_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectbackend
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: projectbackend_app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/projectbackend?sslmode=disable
    depends_on:
      - db

volumes:
  db_data:
